<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineList - Fernando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffd700">
    <meta name="description" content="CineList - Sua Biblioteca de Filmes">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <style>
        /* Estilização suave para o scroll e efeitos de hover */
        .movie-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .movie-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans selection:bg-yellow-500 selection:text-black">

    <header class="sticky top-0 z-50 bg-gray-950/80 backdrop-blur-md border-b border-gray-800 p-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter text-yellow-500">CineList</h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest">Minhas Recomendações</p>
            </div>
            <div id="movie-count" class="text-sm text-gray-400 bg-gray-900 px-3 py-1 rounded-full border border-gray-800">
                Carregando...
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="movie-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20 animate-pulse text-gray-600">
                Buscando filmes na base de dados...
            </div>
        </div>
    </main>

    <script>
        async function loadMovies() {
            const grid = document.getElementById('movie-grid');
            const countBadge = document.getElementById('movie-count');
            
            try {
                // Busca o arquivo JSON que você gerou
                const response = await fetch('filmes.json');
                
                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }
                
                const movies = await response.json();
                
                if (!Array.isArray(movies)) {
                    throw new Error('O arquivo JSON não contém um array válido');
                }
                
                grid.innerHTML = ''; // Limpa o loading
                countBadge.innerText = `${movies.length} Filmes`;

                movies.forEach(movie => {
                    // Validações para evitar erros - compatível com nova estrutura
                    const titulo = movie.titulo || 'Título Desconhecido';
                    const titulo_original = movie.titulo_original || '';
                    const ano = movie.ano || 'Ano Desconhecido';
                    const sinopse = movie.sinopse || movie.sinopse_curta || 'Sinopse não disponível';
                    const capa = movie.capa || 'https://via.placeholder.com/500x750?text=Sem+Capa';
                    
                    // Pega o array de gêneros
                    const generoArray = movie.genero || [];
                    const generoList = Array.isArray(generoArray) 
                        ? generoArray.slice(0, 3)  // Limita a 3 gêneros
                        : (typeof generoArray === 'string' ? [generoArray] : []);

                    // Pega atores principais
                    const atoresArray = movie.atores_principais || [];
                    const atoresList = Array.isArray(atoresArray) 
                        ? atoresArray.slice(0, 2).join(', ')  // Primeiros 2 atores
                        : (typeof atoresArray === 'string' ? atoresArray : 'Atores não disponíveis');

                    grid.innerHTML += `
                        <div class="movie-card bg-gray-900 rounded-2xl overflow-hidden border border-gray-800 shadow-xl flex flex-col h-full hover:border-yellow-500/50 transition-colors">
                            <div class="relative group">
                                <img src="${capa}" 
                                     alt="${titulo}" 
                                     class="w-full h-80 object-cover grayscale-[30%] group-hover:grayscale-0 transition-all duration-500"
                                     onerror="this.src='https://via.placeholder.com/500x750?text=Erro+Capa'">
                                <div class="absolute top-2 right-2">
                                    <span class="bg-black/60 backdrop-blur-md text-yellow-500 text-[10px] font-bold px-2 py-1 rounded-lg border border-yellow-500/30">
                                        ${ano}
                                    </span>
                                </div>
                                ${generoList.length > 0 ? `
                                <div class="absolute bottom-2 left-2 flex flex-wrap gap-1">
                                    ${generoList.map(g => `
                                        <span class="text-[9px] bg-yellow-500/20 text-yellow-300 px-1.5 py-0.5 rounded border border-yellow-500/40">
                                            ${g}
                                        </span>
                                    `).join('')}
                                </div>
                                ` : ''}
                            </div>

                            <div class="p-5 flex flex-col flex-grow">
                                <h2 class="text-lg font-bold leading-tight mb-1 group-hover:text-yellow-500 transition-colors line-clamp-2">${titulo}</h2>
                                ${titulo_original ? `
                                <p class="text-gray-500 text-xs mb-2 italic">${titulo_original}</p>
                                ` : ''}
                                <p class="text-gray-600 text-xs mb-3 line-clamp-1">Com: ${atoresList}</p>
                                
                                <p class="text-gray-400 text-sm line-clamp-3 mb-4 flex-grow leading-relaxed">
                                    ${sinopse}
                                </p>

                                <div class="mt-auto pt-4 border-t border-gray-800">
                                    <button class="w-full py-2 px-3 bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-400 rounded-lg border border-yellow-500/30 hover:border-yellow-500 transition-all text-sm font-medium">
                                        Ver Detalhes
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Erro ao carregar filmes:', error);
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <p class="text-red-500 mb-4 text-lg">❌ Erro ao carregar filmes</p>
                        <p class="text-gray-400 text-sm">Verifique se o arquivo <strong>filmes.json</strong> está na mesma pasta do index.html</p>
                        <p class="text-gray-500 text-xs mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // Carrega os filmes quando o DOM está pronto
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadMovies);
        } else {
            loadMovies();
        }
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => console.log('✅ Service Worker registrado:', registration))
                .catch(error => console.error('❌ Erro ao registrar Service Worker:', error));
        }
    </script>
</body>
</html>
